services:
  db:
    image: postgres:16-alpine
    container_name: invoice-generator-db
    environment:
      POSTGRES_DB: ${DB_NAME:-invoice_generator}
      POSTGRES_USER: ${DB_USER:-invoice}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-invoice}
    ports:
      - "5432:5432"
    volumes:
      - invoice_generator_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-invoice} -d ${DB_NAME:-invoice_generator}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  invoice_generator_db_data:
